<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乙級空污技術員模擬考系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; background-color: #f8fafc; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 真實考古題庫與深度解析 ---
        const ALL_QUESTIONS_POOL = [
            {
                id: 1,
                cat: "3.1 集排氣技術",
                q: "在有害物質之發生處所，當其尚未擴散於作業場所之前，將其吸引排除之方式，稱之為？",
                options: ["整體換氣", "局部排氣", "整體排氣", "自然通風"],
                ans: 1,
                analysis: "正確答案是(2)局部排氣。這是工程控制中最優先且有效的方法。\n\n解析其餘選項：\n(1)整體換氣：是用新鮮空氣稀釋已散布的污染物，濃度仍存在且抽風量巨大，效率較差。\n(3)整體排氣：通常指整廠通風，屬於末端稀釋，而非源頭捕捉。\n(4)自然通風：依賴風力或溫差，無法控制有害物質捕捉方向。"
            },
            {
                id: 2,
                cat: "3.1 集排氣技術",
                q: "氣罩型式很多，若依氣罩與污染源之相對位置及適用範圍分類，下列何者「有誤」？",
                options: ["密閉式氣罩", "箱式氣罩", "外部氣罩", "電磁式氣罩"],
                ans: 3,
                analysis: "正確答案是(4)。空污防制常用的氣罩型式為：密閉式、箱式(包圍式)、外部式、接收式或推拉式。\n\n解析其餘選項：\n(1)密閉式：將污染源完全封閉，效果最佳。\n(2)箱式：污染源位於開口箱內，如噴漆箱。\n(3)外部式：氣罩位於污染源附近，利用吸力抽引，最易受干擾。"
            },
            {
                id: 12,
                cat: "3.1 集排氣技術",
                q: "局部排氣系統各單元設計的優先次序為何？ (a:風管; b:風車; c:氣罩)",
                options: ["a、b、c", "c、b、a", "b、a、c", "c ... a ... b"],
                ans: 3,
                analysis: "正確答案是(4) c-a-b。設計邏輯應由源頭至末端。\n\n解析設計邏輯：\n1. 首先設計(c)氣罩：決定捕捉點風速與所需總風量(Q)。\n2. 接著設計(a)風管：計算流速、路徑阻力與總壓損(TP)。\n3. 最後根據流量(Q)與總壓損(TP)選購(b)風車(Fan/Blower)。順序不可顛倒，否則無法選配正確規格。"
            },
            {
                id: 15,
                cat: "3.1 集排氣技術",
                q: "對一風車(風扇)而言，當轉速改變時，以下關於「馬力需求」之敘述何者正確？",
                options: ["馬力與轉速比成正比", "馬力與轉速比之平方成正比", "馬力與轉速比之三次方成正比", "馬力與轉速比無關"],
                ans: 2,
                analysis: "正確答案是(3)。根據風車定律(Fans Law)：\n- 流量(Q) ∝ 轉速(N)的一次方。\n- 靜壓(P) ∝ 轉速(N)的二次方。\n- 馬力(HP) ∝ 轉速(N)的三次方。\n\n解析：若轉速增加2倍，壓力會變4倍，而馬力則會暴增至8倍，這在設計馬達容量時極為重要。"
            },
            {
                id: 51,
                cat: "3.2 採樣與檢測",
                q: "為了判知樣品在「採樣過程」中是否遭受環境污染，應使用下列哪種空白樣品？",
                options: ["運送空白", "現場空白", "方法空白", "設備空白"],
                ans: 1,
                analysis: "正確答案是(2)現場空白(Field Blank)。\n\n解析其餘選項：\n(1)運送空白：裝瓶後不開封，僅檢測運送過程的滲漏或污染。\n(3)方法空白：在實驗室內操作，檢測分析試劑或流程的污染。\n(4)設備空白：清洗採樣器材後的最後一次沖洗水，檢測設備是否洗乾淨。"
            },
            {
                id: 46,
                cat: "3.2 採樣與檢測",
                q: "等速吸引百分率(I%)用以判定是否維持等速速率採樣，其變化容許範圍為多少？",
                options: ["±2%", "±5%", "±10%", "±15%"],
                ans: 2,
                analysis: "正確答案是(3) ±10% (即 90%~110%)。\n\n解析原理：\n- 若 Vn > Vs (超速採樣)：會採集到較多小顆粒，導致濃度低估。\n- 若 Vn < Vs (低速採樣)：大顆粒因慣性進入採樣管，導致濃度高估。\n法規規範容許差為±10%以確保樣品代表性。"
            },
            {
                id: 103,
                cat: "3.3 操作維護",
                q: "固定污染源許可證記載之各項許可條件數值，在正常操作下得有多少之容許差值？",
                options: ["5%", "10%", "15%", "20%"],
                ans: 1,
                analysis: "正確答案是(2) 10%。根據管理辦法，許可證登載之操作參數數值得有 10% 之容許誤差範圍，目的是為了因應生產變動或儀表微小誤差。"
            },
            {
                id: 113,
                cat: "3.3 操作維護",
                q: "揮發性有機污染物(VOCs)吸附處理設備中，若廢氣濕度過高，對活性碳有何影響？",
                options: ["提升吸附效率", "降低吸附容量", "無任何影響", "會幫助活性碳再生"],
                ans: 1,
                analysis: "正確答案是(2)降低吸附容量。活性碳對有機物具物理吸附力，但水蒸氣會競爭吸附位點。\n\n解析：\n當相對濕度超過 50% 時，水分子會佔據微孔，導致 VOCs 無法進入，效率大幅下降，通常入口廢氣需除濕或控制溫度。"
            }
        ];

        // --- UI 組件 ---
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [examQuestions, setExamQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);

            const startExam = () => {
                const shuffled = [...ALL_QUESTIONS_POOL].sort(() => 0.5 - Math.random());
                setExamQuestions(shuffled.slice(0, 15)); // 實際測試改為所需的題數
                setUserAnswers({});
                setCurrentIdx(0);
                setIsSubmitted(false);
                setView('exam');
                window.scrollTo(0,0);
            };

            const calculateScore = () => {
                let correct = 0;
                examQuestions.forEach((q, i) => { if (userAnswers[i] === q.ans) correct++; });
                return Math.round((correct / examQuestions.length) * 100);
            };

            if (view === 'home') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 animate-fadeIn">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 max-w-xl w-full text-center">
                        <div className="bg-blue-600 w-20 h-20 rounded-3xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl shadow-blue-200">
                            <Icon name="book-open" className="w-10 h-10" />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 mb-2">乙級空污技術員</h1>
                        <p className="text-slate-500 font-bold mb-8 tracking-widest uppercase">專業考古題模擬系統</p>
                        
                        <div className="space-y-4 mb-10 text-left">
                            <div className="flex items-start gap-4 p-4 bg-slate-50 rounded-2xl">
                                <Icon name="check-circle" className="text-blue-600 mt-1" />
                                <div><p className="font-bold text-slate-700">台灣在地化術語</p><p className="text-xs text-slate-500">採用環境部正式術語，拒絕生硬翻譯。</p></div>
                            </div>
                            <div className="flex items-start gap-4 p-4 bg-slate-50 rounded-2xl">
                                <Icon name="help-circle" className="text-green-600 mt-1" />
                                <div><p className="font-bold text-slate-700">全方位解析</p><p className="text-xs text-slate-500">不只看答案，更解析其餘選項為何錯誤。</p></div>
                            </div>
                        </div>

                        <button onClick={startExam} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-xl hover:bg-blue-700 shadow-2xl shadow-blue-100 active:scale-95 transition-all">
                            開始隨機模擬考
                        </button>
                    </div>
                </div>
            );

            if (view === 'exam') {
                const q = examQuestions[currentIdx];
                return (
                    <div className="max-w-2xl mx-auto p-6 pt-10 animate-fadeIn">
                        <div className="flex justify-between items-center mb-8">
                            <span className="bg-slate-800 text-white px-4 py-1.5 rounded-2xl text-xs font-black tracking-widest uppercase">{q.cat}</span>
                            <span className="text-slate-400 font-black text-sm uppercase tracking-tighter">Question {currentIdx + 1} / {examQuestions.length}</span>
                        </div>
                        <div className="bg-white rounded-[2.5rem] p-10 shadow-xl border border-slate-50 mb-8 min-h-[350px] flex flex-col justify-between">
                            <h2 className="text-2xl font-bold text-slate-800 leading-snug mb-10">{q.q}</h2>
                            <div className="space-y-3">
                                {q.options.map((opt, i) => (
                                    <button key={i} onClick={() => setUserAnswers({...userAnswers, [currentIdx]: i})} className={`w-full text-left p-5 rounded-2xl border-2 transition-all flex items-center gap-5 ${userAnswers[currentIdx] === i ? 'border-blue-500 bg-blue-50 text-blue-900 scale-[1.02] shadow-inner' : 'border-slate-50 hover:border-slate-200 bg-slate-50 text-slate-600'}`}>
                                        <span className={`w-8 h-8 rounded-xl flex items-center justify-center font-black ${userAnswers[currentIdx] === i ? 'bg-blue-600 text-white' : 'bg-white text-slate-300 border border-slate-100'}`}>{String.fromCharCode(65 + i)}</span>
                                        <span className="font-bold text-lg">{opt}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="flex justify-between items-center px-4">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(currentIdx - 1)} className="flex items-center gap-2 font-black text-slate-400 disabled:opacity-20 transition-opacity p-2"><Icon name="chevron-left" /> PREV</button>
                            {currentIdx === examQuestions.length - 1 ? (
                                <button onClick={() => { setIsSubmitted(true); setView('results'); }} className="px-12 py-4 bg-green-600 text-white rounded-3xl font-black shadow-2xl hover:bg-green-700 active:scale-95 transition-all">送出試卷</button>
                            ) : (
                                <button onClick={() => setCurrentIdx(currentIdx + 1)} className="flex items-center gap-2 font-black text-blue-600 p-2">NEXT <Icon name="chevron-right" /></button>
                            )}
                        </div>
                    </div>
                );
            }

            if (view === 'results') {
                const score = calculateScore();
                return (
                    <div className="max-w-3xl mx-auto p-6 py-12 animate-fadeIn">
                        <div className="bg-white rounded-[3rem] p-12 shadow-2xl text-center mb-12 border-b-[12px] border-blue-600">
                            <h2 className="text-3xl font-black text-slate-800 mb-6 tracking-tight tracking-tighter">測驗成績統計</h2>
                            <div className="relative inline-flex items-center justify-center mb-8">
                                <svg className="w-48 h-48 transform -rotate-90">
                                    <circle className="text-slate-100" strokeWidth="12" stroke="currentColor" fill="transparent" r="85" cx="96" cy="96" />
                                    <circle className="text-blue-600" strokeWidth="12" strokeDasharray={534} strokeDashoffset={534 - (534 * score) / 100} strokeLinecap="round" stroke="currentColor" fill="transparent" r="85" cx="96" cy="96" />
                                </svg>
                                <div className="absolute flex flex-col items-center">
                                    <span className="text-6xl font-black text-slate-800 tracking-tighter">{score}</span>
                                    <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Points</span>
                                </div>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <button onClick={startExam} className="px-12 py-4 bg-blue-600 text-white rounded-3xl font-black shadow-xl hover:scale-105 transition-transform">再次挑戰考古題</button>
                                <button onClick={() => setView('home')} className="px-12 py-4 bg-slate-100 text-slate-600 rounded-3xl font-black">回首頁</button>
                            </div>
                        </div>

                        <div className="space-y-8 px-4">
                            <h3 className="text-2xl font-black text-slate-800 flex items-center gap-3"><Icon name="bar-chart-2" className="text-blue-600" /> 詳解檢討區</h3>
                            {examQuestions.map((q, i) => (
                                <div key={i} className={`bg-white rounded-[2.5rem] p-8 shadow-sm border-l-[10px] ${userAnswers[i] === q.ans ? 'border-green-500' : 'border-red-500'}`}>
                                    <div className="flex items-center justify-between mb-4">
                                        <span className="text-xs font-black bg-slate-100 text-slate-500 px-3 py-1 rounded-full">第 {i+1} 題</span>
                                        {userAnswers[i] === q.ans ? <span className="text-xs font-black text-green-600">✓ 正確</span> : <span className="text-xs font-black text-red-600">✗ 錯誤</span>}
                                    </div>
                                    <p className="text-xl font-bold text-slate-800 mb-6">{q.q}</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6 font-bold text-sm">
                                        <div className={`p-4 rounded-2xl border ${userAnswers[i] === q.ans ? 'bg-green-50 border-green-100 text-green-800' : 'bg-red-50 border-red-100 text-red-800'}`}>你的選擇：{userAnswers[i] !== undefined ? String.fromCharCode(65 + userAnswers[i]) : "未作答"}</div>
                                        <div className="p-4 rounded-2xl border bg-blue-50 border-blue-100 text-blue-800">正確答案：{String.fromCharCode(65 + q.ans)}</div>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-3xl">
                                        <div className="flex items-center gap-2 text-blue-600 mb-2 font-black text-xs uppercase"><Icon name="info" className="w-4 h-4" /> 深度詳解分析</div>
                                        <p className="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap font-medium">{q.analysis}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
